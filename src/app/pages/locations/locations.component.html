<app-page-banner [pagetitle]="pagetitle"></app-page-banner>
<div class="page-contact-us">
    <div class="contact-info-form">
        <div class="container">
            <div class="row">
                <div class="col-lg-12" *ngFor="let location of locations">
                    <div class="row">
                        <div class="col-lg-6">
                            <div class="contact-information">
                                <div class="contact-info-list">
                                    <div class="contact-info-item">
                                        <div class="contact-info-content">
                                            <h2>{{location.place}}</h2>
                                            <a href="javascript:void(0)"><i class="fa-solid fa-location-dot"
                                                    style="color: var(--secondary-color);"></i>
                                                {{location.location}}</a>
                                            <a href="tell:{{location.phone}}"><i class="fa-solid fa-phone"
                                                    style="color: var(--secondary-color);"></i> {{location.phone}}</a>
                                            <a href="mailto:{{location.mail}}"><i class="fa-solid fa-envelope"
                                                    style="color: var(--secondary-color);"></i> {{location.mail}}</a>
                                        </div>
                                        <div class="header-btn d-inline-flex">
                                            <a href="" class="btn-default">book appointment</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6" style="margin: auto;">
                            <div class="contact-information">
                                <iframe [src]="location.mapUrl" width="100%" height="300" style="border:0;"
                                    allowfullscreen="" loading="lazy">
                                </iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
